# Production docker-compose for the Hetzner host.
#
# Lives at /home/mario/glimpse/docker-compose.yml on the server (NOT used in CI —
# the GitHub Actions workflow SSHes in and runs `docker compose pull` +
# `docker compose up -d` against THIS file).
#
# Required adjacent files on the server:
#   - /home/mario/glimpse/.env   DATABASE_URL, DIRECT_URL, BETTER_AUTH_*,
#                                NEXT_PUBLIC_SITE_URL, HETZNER_S3_*
#                                (gitignored; placed manually during bring-up)
#
# No host volumes — user uploads live in Hetzner Object Storage (NBG1
# bucket, S3-compatible API via @aws-sdk/client-s3). The previous
# /home/mario/glimpse/uploads/ bind mount has been removed.
#
# Traefik integration (the running Traefik container is configured with):
#   - Network:        web   (external, shared with this service)
#   - Entrypoints:    web (:80) and websecure (:443)
#   - HTTP→HTTPS:     handled globally by Traefik
#                     (--entrypoints.web.http.redirections.entrypoint.to=websecure)
#                     so no per-service redirect middleware needed here
#   - Cert resolver:  le (Let's Encrypt, HTTP-01 challenge on the `web`
#                     entrypoint, storage at /acme.json)
#
# DNS sanity:
#   glimpse.jm-squared.com  →  91.99.239.81 (A record, already in place)
#
# First-time bring-up (one-time):
#   1. ssh mario@91.99.239.81
#   2. mkdir -p /home/mario/glimpse/uploads
#   3. cp this file → /home/mario/glimpse/docker-compose.yml
#   4. cp .env (with real secrets) → /home/mario/glimpse/.env  (chmod 600)
#   5. The deploy workflow logs in to GHCR with its own token — no manual
#      `docker login ghcr.io` is required for bring-up.

services:
  glimpse:
    image: ghcr.io/mmi-18/jm-squared-glimpse:latest
    container_name: glimpse
    restart: unless-stopped
    env_file:
      - .env
    # No volumes — uploads now live in Hetzner Object Storage (NBG1
    # bucket), reachable via the HETZNER_S3_* env vars in .env. The
    # /home/mario/glimpse/uploads/ host directory is no longer used
    # and can be deleted once the migrated test files are confirmed
    # in the bucket.
    networks:
      - web
    labels:
      - "traefik.enable=true"

      # HTTPS router — Let's Encrypt cert via the resolver named `le`.
      - "traefik.http.routers.glimpse.rule=Host(`glimpse.jm-squared.com`)"
      - "traefik.http.routers.glimpse.entrypoints=websecure"
      - "traefik.http.routers.glimpse.tls=true"
      - "traefik.http.routers.glimpse.tls.certresolver=le"
      - "traefik.http.services.glimpse.loadbalancer.server.port=3000"

      # Tell Traefik which network to talk to glimpse on (matters when the
      # service is also attached to a default bridge network).
      - "traefik.docker.network=web"

networks:
  web:
    external: true
